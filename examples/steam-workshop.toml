[config]
cache_dir = ".yoita/cache"
staging_dir = ".yoita/staging"
mount_dir = "./mods"

[steam]
# Replace this with a real workshop download service endpoint.
download_endpoint = "https://your-downloader.example/workshop/download"
# api_key = "optional-service-key"

[mods]
# Empty table means: steam source + latest version.
edit-always = {}

# String shorthand means an explicit version, source still defaults to steam.
spell-lab = "1.0.0"

# Override workshop_id only when the mod key and steam identifier differ.
wanddbg = { workshop_id = "3454128340", enabled = true }
