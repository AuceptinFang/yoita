# 支持目录配置，用 id 或字符串简写定位 Steam 工坊项
[config]
cache_dir = ".yoita/cache"
staging_dir = ".yoita/staging"
mount_dir = "./mods"

[steam]
backend = "steamcmd"
steamcmd_path = "steamcmd"
force_install_dir = ".yoita/steamcmd"
app_id = 881100
timeout_secs = 300
login = "anonymous"

[mods]
wanddbg = "2572385079"
edit-always = { id = "2194781427", enabled = false }
custom-pack = { kind = "custom", url = "https://example.invalid/mod.zip" }
